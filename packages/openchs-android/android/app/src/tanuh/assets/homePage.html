<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Tanuh</title>
    </head>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #ffffff;
        }
        .image-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 16px;
            box-sizing: border-box;
        }
        .image-container img {
            max-width: 80%;
            max-height: 50%;
            width: auto;
            height: auto;
            object-fit: contain;
        }
    </style>
    <body>
        <div class="image-container">
            <img src="logo.png" alt="logo">
        </div>
    </body>
</html>
